<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIA Tracker — All In Analytics by KEVPICKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green: #00ff6a;
    --green-dim: rgba(0, 255, 106, 0.15);
    --green-mid: rgba(0, 255, 106, 0.4);
    --red: #ff4444;
    --red-dim: rgba(255, 68, 68, 0.15);
    --bg: #050505;
    --card: #0d0d0d;
    --card-hover: #141414;
    --border: #1a1a1a;
    --border-light: #2a2a2a;
    --text: #ffffff;
    --text-dim: #888888;
    --text-dimmer: #555555;
    --yellow: #ffd700;
    --yellow-dim: rgba(255, 215, 0, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ===== HEADER ===== */
  header {
    padding: 40px 0 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: var(--green);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: #000;
    letter-spacing: -0.5px;
  }

  .brand-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .brand-text span {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-dim);
    color: var(--green);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 20px 0;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border-light); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--green);
  }

  .stat-value.negative { color: var(--red); }

  /* ===== FILTERS ===== */
  .filters {
    display: flex;
    gap: 6px;
    padding: 16px 0;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    background: var(--card);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .filter-btn:hover { border-color: var(--text-dimmer); color: var(--text); }

  .filter-btn.active {
    background: var(--green);
    color: #000;
    border-color: var(--green);
    font-weight: 600;
  }

  /* ===== PICKS ===== */
  .section-label {
    font-size: 11px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 20px 0 12px;
  }

  .pick-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .pick-card:hover { border-color: var(--border-light); background: var(--card-hover); }

  .pick-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .pick-card.pending::before { background: var(--green); }
  .pick-card.win::before { background: var(--green); }
  .pick-card.loss::before { background: var(--red); }
  .pick-card.push::before { background: var(--yellow); }
  .pick-card.void::before { background: var(--text-dimmer); }

  .pick-info h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .pick-meta {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pick-meta .dot { 
    width: 3px; height: 3px; 
    background: var(--text-dimmer); 
    border-radius: 50%; 
  }

  .pick-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .pick-units {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
  }

  .pick-card.win .pick-units { color: var(--green); }
  .pick-card.loss .pick-units { color: var(--red); }
  .pick-card.pending .pick-units { color: var(--green); }
  .pick-card.push .pick-units { color: var(--yellow); }

  .result-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .pick-card.pending .result-badge { 
    background: var(--green-dim); 
    color: var(--green); 
  }
  .pick-card.win .result-badge { 
    background: var(--green); 
    color: #000; 
  }
  .pick-card.loss .result-badge { 
    background: var(--red); 
    color: #fff; 
  }
  .pick-card.push .result-badge { 
    background: var(--yellow); 
    color: #000; 
  }
  .pick-card.void .result-badge {
    background: rgba(85,85,85,0.3);
    color: var(--text-dim);
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dimmer);
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 40px 0;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
  }

  .footer-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--green); }

  .footer-sub {
    font-size: 11px;
    color: var(--text-dimmer);
  }

  /* ===== ADMIN PANEL ===== */
  .admin-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 100;
  }

  .admin-toggle:hover { border-color: var(--green); color: var(--green); }

  .admin-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px;
    overflow-y: auto;
  }

  .admin-overlay.open { display: flex; }

  .admin-panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    width: 100%;
    max-width: 520px;
  }

  .admin-panel h2 {
    font-size: 18px;
    margin-bottom: 4px;
  }

  .admin-panel .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--green);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-submit {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .btn-submit:hover { opacity: 0.9; }

  .btn-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-close:hover { border-color: var(--text-dimmer); }

  /* Quick result buttons on pick cards (admin mode) */
  .admin-actions {
    display: none;
    gap: 4px;
    margin-top: 8px;
  }

  .admin-mode .pick-card.pending .admin-actions { display: flex; }

  .admin-actions button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }

  .admin-actions button:hover { opacity: 0.8; }
  .btn-win { background: var(--green); color: #000; }
  .btn-loss { background: var(--red); color: #fff; }
  .btn-push { background: var(--yellow); color: #000; }

  /* ===== LOADING ===== */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dimmer);
  }

  .loading-spinner {
    width: 30px;
    height: 30px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: var(--green);
    color: #000;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 300;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 18px; }
    .header-top { flex-direction: column; align-items: flex-start; gap: 12px; }
    .brand-text h1 { font-size: 18px; }
    .filters { gap: 4px; }
    .filter-btn { padding: 6px 14px; font-size: 11px; }
    .form-row { grid-template-columns: 1fr; }
    .admin-panel { padding: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="logo-mark">AIA</div>
        <div class="brand-text">
          <h1>ALL IN ANALYTICS</h1>
          <span>by KEVPICKS</span>
        </div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </div>
  </header>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">Record</div>
      <div class="stat-value" id="statRecord">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Win %</div>
      <div class="stat-value" id="statWinPct">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ROI</div>
      <div class="stat-value" id="statROI">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Units</div>
      <div class="stat-value" id="statUnits">—</div>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-sport="all">All</button>
    <button class="filter-btn" data-sport="NBA">NBA</button>
    <button class="filter-btn" data-sport="MLB">MLB</button>
    <button class="filter-btn" data-sport="NHL">NHL</button>
    <button class="filter-btn" data-sport="EPL">EPL</button>
    <button class="filter-btn" data-sport="Soccer">Soccer</button>
    <button class="filter-btn" data-sport="NCAAB">NCAAB</button>
    <button class="filter-btn" data-sport="NCAAF">NCAAF</button>
    <button class="filter-btn" data-sport="NFL">NFL</button>
  </div>

  <div id="picksContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      Loading picks...
    </div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="https://kevpicks.com" target="_blank">kevpicks.com</a>
      <a href="https://tiktok.com/@aia.kev" target="_blank">TikTok</a>
      <a href="https://instagram.com/kevpicks" target="_blank">Instagram</a>
    </div>
    <div class="footer-sub">Powered by Supabase — Updated in real time</div>
  </footer>
</div>

<!-- Admin Toggle -->
<button class="admin-toggle" id="adminToggle" title="Admin Panel">+</button>

<!-- Admin Overlay -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <h2>Add pick</h2>
    <div class="sub">This will go live immediately on the tracker.</div>

    <div class="form-group">
      <label>Pick</label>
      <input type="text" id="inputPick" placeholder="e.g. Lakers vs Celtics — Under 215.5">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Sport</label>
        <select id="inputSport">
          <option value="NBA">NBA</option>
          <option value="MLB">MLB</option>
          <option value="NHL">NHL</option>
          <option value="NFL">NFL</option>
          <option value="EPL">EPL</option>
          <option value="Soccer">Soccer</option>
          <option value="NCAAB">NCAAB</option>
          <option value="NCAAF">NCAAF</option>
        </select>
      </div>
      <div class="form-group">
        <label>Odds</label>
        <input type="number" id="inputOdds" placeholder="-110">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Units</label>
        <input type="number" id="inputUnits" step="0.5" min="0.5" max="10" placeholder="2">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="inputDate">
      </div>
    </div>

    <div class="form-group">
      <label>Notes (optional)</label>
      <input type="text" id="inputNotes" placeholder="Any additional context">
    </div>

    <button class="btn-submit" id="btnSubmit">Post pick</button>
    <button class="btn-close" id="btnClose">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ===== SUPABASE CONFIG =====
  const SUPABASE_URL = 'https://chzecaadlueoujiqtqrj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoemVjYWFkbHVlb3VqaXF0cXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDk0MTgsImV4cCI6MjA5MjIyNTQxOH0.iYY5GJ9IOvpgNrfsHqolVpwX3pCIns8d8P3_RABbWCU';
  
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ===== STATE =====
  let allPicks = [];
  let currentFilter = 'all';
  let isAdmin = false;

  // ===== ELEMENTS =====
  const container = document.getElementById('picksContainer');
  const statsRecord = document.getElementById('statRecord');
  const statsWinPct = document.getElementById('statWinPct');
  const statsROI = document.getElementById('statROI');
  const statsUnits = document.getElementById('statUnits');
  const adminOverlay = document.getElementById('adminOverlay');
  const adminToggle = document.getElementById('adminToggle');
  const toast = document.getElementById('toast');

  // ===== INIT =====
  async function init() {
    await loadPicks();
    setupFilters();
    setupAdmin();
    setupRealtime();
  }

  // ===== LOAD PICKS =====
  async function loadPicks() {
    try {
      const { data, error } = await sb
        .from('picks')
        .select('*')
        .eq('is_visible', true)
        .order('date', { ascending: false })
        .order('created_at', { ascending: false });

      if (error) throw error;
      allPicks = data || [];
      updateStats();
      renderPicks();
    } catch (err) {
      console.error('Error loading picks:', err);
      container.innerHTML = `
        <div class="empty-state">
          <p>Could not connect to database.</p>
          <p style="font-size: 12px; margin-top: 8px;">Make sure the picks table is set up in Supabase.</p>
        </div>`;
    }
  }

  // ===== CALCULATE STATS =====
  function updateStats() {
    const settled = allPicks.filter(p => p.result === 'win' || p.result === 'loss');
    const wins = settled.filter(p => p.result === 'win').length;
    const losses = settled.filter(p => p.result === 'loss').length;
    const pushes = allPicks.filter(p => p.result === 'push').length;
    const totalPL = allPicks.reduce((sum, p) => sum + Number(p.profit_loss || 0), 0);
    const totalUnitsRisked = settled.reduce((sum, p) => sum + Number(p.units), 0);
    const winPct = settled.length > 0 ? ((wins / settled.length) * 100) : 0;
    const roi = totalUnitsRisked > 0 ? ((totalPL / totalUnitsRisked) * 100) : 0;

    statsRecord.textContent = `${wins}-${losses}${pushes > 0 ? '-' + pushes : ''}`;
    statsWinPct.textContent = `${winPct.toFixed(1)}%`;
    
    statsROI.textContent = `${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%`;
    statsROI.className = `stat-value ${roi < 0 ? 'negative' : ''}`;
    
    statsUnits.textContent = `${totalPL >= 0 ? '+' : ''}${totalPL.toFixed(1)}`;
    statsUnits.className = `stat-value ${totalPL < 0 ? 'negative' : ''}`;
  }

  // ===== RENDER PICKS =====
  function renderPicks() {
    const filtered = currentFilter === 'all' 
      ? allPicks 
      : allPicks.filter(p => p.sport === currentFilter);

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <p>No picks yet${currentFilter !== 'all' ? ' for ' + currentFilter : ''}.</p>
        </div>`;
      return;
    }

    // Group by date
    const groups = {};
    filtered.forEach(pick => {
      const d = pick.date;
      if (!groups[d]) groups[d] = [];
      groups[d].push(pick);
    });

    let html = '';
    const today = new Date().toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

    Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(date => {
      let label = date;
      if (date === today) label = "Today's picks";
      else if (date === yesterday) label = "Yesterday";
      else {
        const d = new Date(date + 'T12:00:00');
        label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }

      html += `<div class="section-label">${label}</div>`;

      groups[date].forEach(pick => {
        const oddsStr = pick.odds > 0 ? `+${pick.odds}` : `${pick.odds}`;
        let badgeText = pick.result.toUpperCase();
        if (pick.result === 'win') badgeText = `WIN +${Number(pick.profit_loss).toFixed(2)}U`;
        else if (pick.result === 'loss') badgeText = `LOSS ${Number(pick.profit_loss).toFixed(2)}U`;
        else if (pick.result === 'push') badgeText = 'PUSH';
        else if (pick.result === 'void') badgeText = 'VOID';

        html += `
          <div class="pick-card ${pick.result}" data-id="${pick.id}">
            <div class="pick-info">
              <h3>${escapeHtml(pick.pick)}</h3>
              <div class="pick-meta">
                <span>${pick.sport}</span>
                <span class="dot"></span>
                <span>${oddsStr}</span>
                ${pick.notes ? `<span class="dot"></span><span>${escapeHtml(pick.notes)}</span>` : ''}
              </div>
              <div class="admin-actions">
                <button class="btn-win" onclick="setResult('${pick.id}', 'win', ${pick.units}, ${pick.odds})">Win</button>
                <button class="btn-loss" onclick="setResult('${pick.id}', 'loss', ${pick.units}, ${pick.odds})">Loss</button>
                <button class="btn-push" onclick="setResult('${pick.id}', 'push', ${pick.units}, ${pick.odds})">Push</button>
              </div>
            </div>
            <div class="pick-right">
              <div class="pick-units">${Number(pick.units).toFixed(1)}U</div>
              <div class="result-badge">${badgeText}</div>
            </div>
          </div>`;
      });
    });

    container.innerHTML = html;
  }

  // ===== FILTERS =====
  function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.sport;
        renderPicks();
      });
    });
  }

  // ===== ADMIN =====
  function setupAdmin() {
    // Set today's date as default
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

    adminToggle.addEventListener('click', () => {
      // Toggle admin mode on body for showing result buttons
      if (adminOverlay.classList.contains('open')) {
        adminOverlay.classList.remove('open');
      } else {
        adminOverlay.classList.add('open');
        document.body.classList.add('admin-mode');
      }
    });

    document.getElementById('btnClose').addEventListener('click', () => {
      adminOverlay.classList.remove('open');
    });

    adminOverlay.addEventListener('click', (e) => {
      if (e.target === adminOverlay) adminOverlay.classList.remove('open');
    });

    document.getElementById('btnSubmit').addEventListener('click', addPick);

    // Toggle admin mode with keyboard shortcut (Ctrl+Shift+A)
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'A') {
        e.preventDefault();
        isAdmin = !isAdmin;
        document.body.classList.toggle('admin-mode', isAdmin);
        showToast(isAdmin ? 'Admin mode on' : 'Admin mode off');
      }
    });
  }

  // ===== ADD PICK =====
  async function addPick() {
    const pick = document.getElementById('inputPick').value.trim();
    const sport = document.getElementById('inputSport').value;
    const odds = parseInt(document.getElementById('inputOdds').value);
    const units = parseFloat(document.getElementById('inputUnits').value);
    const date = document.getElementById('inputDate').value;
    const notes = document.getElementById('inputNotes').value.trim();

    if (!pick || !odds || !units || !date) {
      showToast('Fill in all required fields');
      return;
    }

    try {
      const { error } = await sb.from('picks').insert([{
        pick, sport, odds, units, date, notes: notes || null,
        result: 'pending', profit_loss: 0, is_visible: true
      }]);

      if (error) throw error;

      showToast('Pick posted!');
      adminOverlay.classList.remove('open');
      
      // Clear form
      document.getElementById('inputPick').value = '';
      document.getElementById('inputOdds').value = '';
      document.getElementById('inputUnits').value = '';
      document.getElementById('inputNotes').value = '';
      
      await loadPicks();
    } catch (err) {
      console.error('Error adding pick:', err);
      showToast('Error posting pick');
    }
  }

  // ===== SET RESULT =====
  async function setResult(id, result, units, odds) {
    let profitLoss = 0;
    
    if (result === 'win') {
      if (odds > 0) {
        profitLoss = units * (odds / 100);
      } else {
        profitLoss = units * (100 / Math.abs(odds));
      }
      profitLoss = Math.round(profitLoss * 100) / 100;
    } else if (result === 'loss') {
      profitLoss = -units;
    }

    try {
      const { error } = await sb
        .from('picks')
        .update({ result, profit_loss: profitLoss })
        .eq('id', id);

      if (error) throw error;

      showToast(`Marked as ${result.toUpperCase()}`);
      await loadPicks();
    } catch (err) {
      console.error('Error updating pick:', err);
      showToast('Error updating result');
    }
  }

  // ===== REAL-TIME UPDATES =====
  function setupRealtime() {
    sb
      .channel('picks-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'picks' }, () => {
        loadPicks();
      })
      .subscribe();
  }

  // ===== HELPERS =====
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ===== GO =====
  init();
</script>

</body>
</html>
