<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIA Tracker — All In Analytics by KEVPICKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --green: #00ff6a;
    --green-dim: rgba(0, 255, 106, 0.12);
    --green-glow: rgba(0, 255, 106, 0.25);
    --red: #ff3b3b;
    --red-dim: rgba(255, 59, 59, 0.12);
    --yellow: #ffd000;
    --yellow-dim: rgba(255, 208, 0, 0.12);
    --bg: #030303;
    --surface: #0a0a0a;
    --card: #0f0f0f;
    --card-hover: #161616;
    --border: #1c1c1c;
    --text: #f0f0f0;
    --text-mid: #b0b0b0;
    --text-dim: #606060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 36px 0 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 52px;
    height: 52px;
    background: var(--green);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 19px;
    color: #000;
    letter-spacing: -0.5px;
    box-shadow: 0 0 20px var(--green-glow);
  }

  .brand-info h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }

  .brand-info p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    background: var(--green-dim);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(0,255,106,0.15);
  }

  .live-pill .dot {
    width: 5px; height: 5px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 2s infinite;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .premium-btn {
    display: flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #000;
    background: var(--green);
    padding: 6px 14px;
    border-radius: 20px;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .premium-btn:hover { opacity: 0.85; }

  .premium-btn-mobile {
    display: none;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #000;
    background: var(--green);
    padding: 6px 14px;
    border-radius: 20px;
    text-decoration: none;
    margin-top: 12px;
    transition: opacity 0.15s;
  }

  .premium-btn-mobile:hover { opacity: 0.85; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ===== STATS ===== */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 20px 0;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--green);
  }

  .stat-val.neg { color: var(--red); }

  /* ===== FILTER ROWS ===== */
  .filter-section { padding: 14px 0 0; }

  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 10px;
  }

  .filter-row::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    background: var(--card);
    color: var(--text-mid);
    border: 1px solid var(--border);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .tab:hover { border-color: var(--text-dim); color: var(--text); }

  .tab.active {
    background: var(--green);
    color: #000;
    border-color: var(--green);
    font-weight: 700;
  }

  .range-tab {
    flex-shrink: 0;
    background: none;
    color: var(--text-mid);
    border: 1px solid var(--border);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .range-tab:hover { border-color: var(--text-dim); color: var(--text); }

  .range-tab.active {
    background: var(--green-dim);
    color: var(--green);
    border-color: rgba(0,255,106,0.3);
    font-weight: 700;
  }

  .filter-divider { border-bottom: 1px solid var(--border); }

  /* ===== CHART ===== */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-top: 20px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .chart-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .chart-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
  }

  .chart-value.pos { color: var(--green); }
  .chart-value.neg { color: var(--red); }

  .chart-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    margin-top: 2px;
    min-height: 20px;
  }

  .chart-arrow {
    font-size: 20px;
    font-weight: 700;
  }

  .chart-wrap {
    position: relative;
    height: 240px;
  }

  /* ===== PICKS TOGGLE ===== */
  .picks-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
  }

  .picks-toggle:hover { border-color: var(--text-dim); color: var(--text); }

  .picks-toggle .arrow {
    transition: transform 0.2s;
    font-size: 11px;
  }

  .picks-toggle.open .arrow { transform: rotate(180deg); }

  /* ===== SECTION LABEL ===== */
  .day-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 24px 0 10px;
  }

  /* ===== PICK CARDS ===== */
  .pick {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
    position: relative;
  }

  .pick:hover { background: var(--card-hover); }

  .pick::after {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }

  .pick.pending::after { background: var(--green); }
  .pick.win::after { background: var(--green); }
  .pick.loss::after { background: var(--red); }
  .pick.push::after { background: var(--yellow); }
  .pick.void::after { background: var(--text-dim); }

  .pick-left { padding-left: 6px; min-width: 0; }

  .pick-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 400px;
  }

  .pick-meta {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pick-meta .sep {
    width: 3px; height: 3px;
    background: var(--text-dim);
    border-radius: 50%;
  }

  .capper-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--green-dim);
    color: var(--green);
  }

  .pick-odds {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--text);
  }

  .pick-size {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--text);
  }

  .pick-right {
    text-align: right;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }

  .pick-units {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 600;
  }

  .pick.win .pick-units { color: var(--green); }
  .pick.loss .pick-units { color: var(--red); }
  .pick.pending .pick-units { color: var(--text); }
  .pick.push .pick-units { color: var(--yellow); }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .pick.pending .badge { background: var(--green-dim); color: var(--green); }
  .pick.win .badge { background: var(--green); color: #000; }
  .pick.loss .badge { background: var(--red); color: #fff; }
  .pick.push .badge { background: var(--yellow); color: #000; }
  .pick.void .badge { background: rgba(74,74,74,0.3); color: var(--text-mid); }

  /* ===== EMPTY / LOADING ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .loader {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
    font-size: 13px;
  }

  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 36px 0;
    margin-top: 40px;
    border-top: 1px solid var(--border);
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 10px;
  }

  .footer-links a {
    color: var(--text-mid);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    transition: color 0.15s;
  }

  .footer-links a:hover { color: var(--green); }

  .footer-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-val { font-size: 17px; }
    .header-row { flex-direction: row; align-items: center; }
    .brand-info h1 { font-size: 14px; }
    .header-right .premium-btn { display: none; }
    .premium-btn-mobile { display: inline-block; }
    .pick-name { max-width: none; white-space: normal; word-break: break-word; }
    .pick-meta { flex-wrap: wrap; }
    .tab { font-size: 12px; padding: 7px 14px; }
    .range-tab { font-size: 11px; padding: 5px 12px; }
    .day-label { font-size: 11px; }
    .chart-wrap { height: 160px; }
    .chart-value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-row">
      <div class="brand">
        <div class="logo">AIA</div>
        <div class="brand-info">
          <h1>ALL IN ANALYTICS TRACKER</h1>
        </div>
      </div>
      <div class="header-right">
        <a href="https://www.winible.com/allinanalytics?a=736F46" target="_blank" class="premium-btn">JOIN PREMIUM</a>
        <div class="live-pill">
          <span class="dot"></span>
          LIVE
        </div>
      </div>
    </div>
    <a href="https://www.winible.com/allinanalytics?a=736F46" target="_blank" class="premium-btn-mobile">JOIN PREMIUM</a>
  </div>

  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-label">Record</div>
      <div class="stat-val" id="sRecord">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Win %</div>
      <div class="stat-val" id="sWinPct">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">ROI</div>
      <div class="stat-val" id="sROI">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Units</div>
      <div class="stat-val" id="sUnits">—</div>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-row" id="capperTabs"></div>
    <div class="filter-row" id="rangeTabs"></div>
    <div class="filter-divider"></div>
  </div>

  <!-- Chart (desktop only) -->
  <div class="chart-card" id="chartCard">
    <div class="chart-header">
      <div>
        <div class="chart-title">Cumulative units</div>
        <div class="chart-value pos" id="chartValue">—</div>
        <div class="chart-date" id="chartDate"></div>
      </div>
      <div class="chart-arrow" id="chartArrow" style="color: var(--green);">↗</div>
    </div>
    <div class="chart-wrap">
      <canvas id="unitChart"></canvas>
    </div>
  </div>

  <!-- Picks toggle -->
  <div class="picks-toggle" id="picksToggle">
    <span>Show all picks</span>
    <span class="arrow">▼</span>
  </div>

  <div id="feed" style="display: none;"></div>



</div>

<script>
  // ===== SUPABASE =====
  const SUPA_URL = 'https://chzecaadlueoujiqtqrj.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoemVjYWFkbHVlb3VqaXF0cXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDk0MTgsImV4cCI6MjA5MjIyNTQxOH0.iYY5GJ9IOvpgNrfsHqolVpwX3pCIns8d8P3_RABbWCU';
  const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  // ===== STATE =====
  let picks = [];
  let capperFilter = 'all';
  let rangeFilter = 'all';
  let picksVisible = false;
  let unitChart = null;
  let lastDataHash = '';

  // ===== ELEMENTS =====
  const feed = document.getElementById('feed');
  const capperTabsEl = document.getElementById('capperTabs');
  const rangeTabsEl = document.getElementById('rangeTabs');
  const picksToggle = document.getElementById('picksToggle');

  // ===== PICKS TOGGLE =====
  picksToggle.addEventListener('click', () => {
    picksVisible = !picksVisible;
    feed.style.display = picksVisible ? 'block' : 'none';
    picksToggle.classList.toggle('open', picksVisible);
    picksToggle.querySelector('span').textContent = picksVisible ? 'Hide picks' : 'Show all picks';
  });

  // ===== DATE HELPERS =====
  function localDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function getToday() { return localDate(new Date()); }

  function getYesterday() {
    const d = new Date(); d.setDate(d.getDate()-1);
    return localDate(d);
  }

  function getStartOfWeek() {
    const d = new Date();
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d); mon.setDate(diff);
    return localDate(mon);
  }

  function getStartOfMonth() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
  }

  function getStartOfYear() {
    return `${new Date().getFullYear()}-01-01`;
  }

  function formatOdds(american) {
    if (american >= 100) return `+${american}`;
    return `${american}`;
  }

  function formatDateLabel(dateStr) {
    const today = getToday();
    const yesterday = getYesterday();
    if (dateStr === today) return 'Today';
    if (dateStr === yesterday) return 'Yesterday';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // ===== INIT =====
  async function init() {
    await load();
    listenRealtime();
  }

  // ===== LOAD =====
  async function load(force) {
    try {
      const { data, error } = await sb
        .from('picks')
        .select('*')
        .order('date', { ascending: false })
        .order('created_at', { ascending: false });

      if (error) throw error;

      // Only re-render if data changed
      const hash = JSON.stringify(data);
      if (!force && hash === lastDataHash) return;
      lastDataHash = hash;

      picks = data || [];
      buildCapperTabs();
      buildRangeTabs();
      render();
    } catch (e) {
      console.error('Load error:', e);
      feed.innerHTML = '<div class="empty">Could not connect to database.</div>';
    }
  }

  // ===== FILTER PICKS =====
  function getFilteredPicks() {
    let filtered = picks;

    if (capperFilter !== 'all') {
      filtered = filtered.filter(p => p.capper === capperFilter);
    }

    const today = getToday();
    const yesterday = getYesterday();

    if (rangeFilter === 'today') {
      filtered = filtered.filter(p => p.date === today);
    } else if (rangeFilter === 'yesterday') {
      filtered = filtered.filter(p => p.date === yesterday);
    } else if (rangeFilter === 'week') {
      const start = getStartOfWeek();
      filtered = filtered.filter(p => p.date >= start && p.date <= today);
    } else if (rangeFilter === 'month') {
      const start = getStartOfMonth();
      filtered = filtered.filter(p => p.date >= start && p.date <= today);
    } else if (rangeFilter === 'year') {
      const start = getStartOfYear();
      filtered = filtered.filter(p => p.date >= start && p.date <= today);
    }

    return filtered;
  }

  // ===== STATS =====
  function calcStats(list) {
    const settled = list.filter(p => p.result === 'win' || p.result === 'loss');
    const wins = settled.filter(p => p.result === 'win').length;
    const losses = settled.filter(p => p.result === 'loss').length;
    const pushes = list.filter(p => p.result === 'push').length;
    const pl = list.reduce((s, p) => s + Number(p.profit_loss || 0), 0);
    const risked = settled.reduce((s, p) => s + Number(p.units), 0);
    const pct = settled.length ? ((wins / settled.length) * 100) : 0;
    const roi = risked > 0 ? ((pl / risked) * 100) : 0;

    document.getElementById('sRecord').textContent = `${wins}-${losses}${pushes ? '-' + pushes : ''}`;
    document.getElementById('sWinPct').textContent = `${pct.toFixed(1)}%`;

    const roiEl = document.getElementById('sROI');
    roiEl.textContent = `${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%`;
    roiEl.className = `stat-val ${roi < 0 ? 'neg' : ''}`;

    const unitsEl = document.getElementById('sUnits');
    unitsEl.textContent = `${pl >= 0 ? '+' : ''}${pl.toFixed(1)}`;
    unitsEl.className = `stat-val ${pl < 0 ? 'neg' : ''}`;

    return pl;
  }

  // ===== CAPPER TABS =====
  function buildCapperTabs() {
    const cappers = [...new Set(picks.map(p => p.capper).filter(Boolean))];
    cappers.sort();

    let html = `<button class="tab ${capperFilter === 'all' ? 'active' : ''}" data-f="all">All</button>`;
    cappers.forEach(c => {
      html += `<button class="tab ${capperFilter === c ? 'active' : ''}" data-f="${esc(c)}">${esc(c)}</button>`;
    });
    capperTabsEl.innerHTML = html;

    capperTabsEl.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        capperFilter = btn.dataset.f;
        capperTabsEl.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });
  }

  // ===== RANGE TABS =====
  function buildRangeTabs() {
    const ranges = [
      { key: 'all', label: 'All Time' },
      { key: 'today', label: 'Today' },
      { key: 'yesterday', label: 'Yesterday' },
      { key: 'week', label: 'Week' },
      { key: 'month', label: 'Month' },
      { key: 'year', label: 'Year' }
    ];

    let html = '';
    ranges.forEach(r => {
      html += `<button class="range-tab ${rangeFilter === r.key ? 'active' : ''}" data-r="${r.key}">${r.label}</button>`;
    });
    rangeTabsEl.innerHTML = html;

    rangeTabsEl.querySelectorAll('.range-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        rangeFilter = btn.dataset.r;
        rangeTabsEl.querySelectorAll('.range-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });
  }

  // ===== BUILD CHART =====
  function buildChart(filtered) {
    const settled = filtered.filter(p => p.result === 'win' || p.result === 'loss' || p.result === 'push');
    if (!settled.length) {
      document.getElementById('chartCard').style.display = 'none';
      return;
    }
    document.getElementById('chartCard').style.display = 'block';

    // Sort by date ascending
    const sorted = [...settled].sort((a, b) => a.date.localeCompare(b.date));

    // Build cumulative data grouped by day
    const dayMap = {};
    sorted.forEach(p => {
      if (!dayMap[p.date]) dayMap[p.date] = 0;
      dayMap[p.date] += Number(p.profit_loss || 0);
    });

    const dates = Object.keys(dayMap).sort();
    const labels = [];
    const data = [];
    let cumulative = 0;

    dates.forEach(d => {
      cumulative += dayMap[d];
      labels.push(d);
      data.push(Math.round(cumulative * 100) / 100);
    });

    const finalVal = data[data.length - 1] || 0;
    const isPos = finalVal >= 0;

    const chartValueEl = document.getElementById('chartValue');
    chartValueEl.textContent = `${isPos ? '+' : ''}${finalVal.toFixed(1)}u`;
    chartValueEl.className = `chart-value ${isPos ? 'pos' : 'neg'}`;
    document.getElementById('chartDate').textContent = '';
    document.getElementById('chartArrow').textContent = isPos ? '↗' : '↘';
    document.getElementById('chartArrow').style.color = isPos ? 'var(--green)' : 'var(--red)';

    const ctx = document.getElementById('unitChart').getContext('2d');

    if (unitChart) unitChart.destroy();

    const lineColor = isPos ? '#00ff6a' : '#ff3b3b';
    const fillColor = isPos ? 'rgba(0,255,106,0.08)' : 'rgba(255,59,59,0.08)';

    unitChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          borderColor: lineColor,
          backgroundColor: fillColor,
          borderWidth: 2.5,
          fill: true,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHoverBackgroundColor: lineColor,
          pointHoverBorderColor: '#0f0f0f',
          pointHoverBorderWidth: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: 'index',
          intersect: false,
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: false,
            external: function(context) {
              const tooltip = context.tooltip;
              if (tooltip.opacity === 0) {
                chartValueEl.textContent = `${isPos ? '+' : ''}${finalVal.toFixed(1)}u`;
                chartValueEl.className = `chart-value ${isPos ? 'pos' : 'neg'}`;
                document.getElementById('chartDate').textContent = '';
                return;
              }
              const idx = tooltip.dataPoints[0].dataIndex;
              const val = data[idx];
              const dateStr = labels[idx];
              const valPos = val >= 0;
              chartValueEl.textContent = `${valPos ? '+' : ''}${val.toFixed(1)}u`;
              chartValueEl.className = `chart-value ${valPos ? 'pos' : 'neg'}`;
              document.getElementById('chartDate').textContent = formatDateLabel(dateStr);
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
            ticks: {
              color: '#606060',
              font: { family: 'Outfit', size: 10 },
              maxTicksLimit: 8,
              callback: function(val, idx) {
                return formatDateLabel(this.getLabelForValue(val));
              }
            }
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
            ticks: {
              color: '#606060',
              font: { family: 'JetBrains Mono', size: 10 },
              callback: function(val) {
                return (val >= 0 ? '+' : '') + val.toFixed(0) + 'u';
              }
            }
          }
        }
      }
    });
  }

  // ===== RENDER =====
  function render() {
    const filtered = getFilteredPicks();
    const totalPL = calcStats(filtered);
    buildChart(filtered);

    // Update toggle count
    picksToggle.querySelector('span').textContent = picksVisible
      ? 'Hide picks'
      : `Show all picks (${filtered.length})`;

    if (!filtered.length) {
      feed.innerHTML = `<div class="empty">No picks${capperFilter !== 'all' ? ' for ' + capperFilter : ''}${rangeFilter !== 'all' ? ' ' + rangeFilter : ''}.</div>`;
      return;
    }

    const groups = {};
    filtered.forEach(p => {
      if (!groups[p.date]) groups[p.date] = [];
      groups[p.date].push(p);
    });

    const today = getToday();
    const yesterday = getYesterday();

    let html = '';
    Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(date => {
      let label;
      if (date === today) label = "Today";
      else if (date === yesterday) label = "Yesterday";
      else {
        const d = new Date(date + 'T12:00:00');
        label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      }

      html += `<div class="day-label">${label}</div>`;

      groups[date].forEach(p => {
        const odds = formatOdds(p.american_odds);
        const units = Number(p.units).toFixed(1);
        const result = p.result || 'pending';

        let badgeText = result.toUpperCase();
        if (result === 'win') badgeText = `WIN +${Number(p.profit_loss).toFixed(2)}U`;
        else if (result === 'loss') badgeText = `LOSS ${Number(p.profit_loss).toFixed(2)}U`;

        html += `
          <div class="pick ${result}">
            <div class="pick-left">
              <div class="pick-name">${esc(p.pick)}</div>
              <div class="pick-meta">
                <span class="capper-tag">${esc(p.capper || '—')}</span>
                <span class="sep"></span>
                <span class="pick-odds">${odds}</span>
                <span class="sep"></span>
                <span class="pick-size">${units}U</span>
              </div>
            </div>
            <div class="pick-right">
              <div class="pick-units">${units}U</div>
              <div class="badge">${badgeText}</div>
            </div>
          </div>`;
      });
    });

    feed.innerHTML = html;
  }

  // ===== REALTIME =====
  function listenRealtime() {
    sb.channel('picks-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'picks' }, () => {
        load(true);
      })
      .subscribe();

    setInterval(() => { load(); }, 30000);
  }

  // ===== HELPERS =====
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  init();
</script>
